<div class="setup-container">

    <div class="card">

        <h2>
            ⚙ Form Setup
        </h2>

        <div class="form-group">

            <label>
                Form Name
            </label>

            <input
            type="text"
            [(ngModel)]="form.formName"
            placeholder="Enter Form Name"
            >

        </div>


        <div class="form-group">

            <label>
                Description
            </label>

            <textarea
            [(ngModel)]="form.description"
            rows="4"
            placeholder="Enter Description"
            >
            </textarea>

        </div>


        <div class="row">

            <div class="form-group">

                <label>
                    Category
                </label>

                <select
                [(ngModel)]="form.category"
                >

                    <option value="">
                        Select
                    </option>

                    <option>
                        Employee
                    </option>

                    <option>
                        Survey
                    </option>

                    <option>
                        Feedback
                    </option>

                </select>

            </div>


            <div class="form-group">

                <label>
                    Theme Color
                </label>

                <input
                type="color"
                [(ngModel)]="form.theme"
                >

            </div>

        </div>


        <div class="row">

            <div class="form-group">

                <label>
                    Start Date
                </label>

                <input
                type="date"
                [(ngModel)]="form.startDate"
                >

            </div>


            <div class="form-group">

                <label>
                    End Date
                </label>

                <input
                type="date"
                [(ngModel)]="form.endDate"
                >

            </div>

        </div>


        <div class="switch-container">

            <label>

                Allow Multiple Submit

            </label>

            <input
            type="checkbox"
            [(ngModel)]="form.multipleSubmit"
            >

        </div>


        <div class="switch-container">

            <label>

                Active Status

            </label>

            <input
            type="checkbox"
            [(ngModel)]="form.status"
            >

        </div>


        <button
class="save-btn"
(click)="saveForm()"
>

Save Form

</button>

    </div>

</div>
